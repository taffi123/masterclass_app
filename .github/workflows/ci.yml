name: Laravel CI/CD Pipeline

on:
  push:
    branches: [develop, dev, uat, qa, main, master]
  pull_request:
    branches: [develop, dev, uat, qa, main, master]

jobs:
  tests:
    name: Tests with coverage gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, mbstring, xml, xmlwriter, sqlite3, pdo_sqlite
          coverage: xdebug

      - name: Validate composer files
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare CI environment
        run: |
          cp .env.ci .env
          php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Prepare Laravel directories
        run: |
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p bootstrap/cache
          chmod -R 777 storage bootstrap/cache

      - name: Run Laravel tests and enforce 50% coverage
        run: php artisan test --coverage --min=50

  static-analysis:
    name: PHPStan / Larastan
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, mbstring, xml, xmlwriter, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare CI environment
        run: |
          cp .env.ci .env
          php artisan key:generate --force

      - name: Run Larastan
        run: ./vendor/bin/phpstan analyse --error-format=github

  lint:
    name: Laravel Pint lint check
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, mbstring, xml, xmlwriter, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint in test mode
        run: ./vendor/bin/pint --test

  deploy-dev:
    name: Deploy simulation DEV
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref_name == 'develop' || github.ref_name == 'dev'
    steps:
      - uses: actions/checkout@v4
      - name: Simulate deployment
        run: |
          cp .env.dev .env
          echo "Deploying to DEV with .env.dev"

  deploy-uat:
    name: Deploy simulation UAT
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref_name == 'uat' || github.ref_name == 'qa'
    steps:
      - uses: actions/checkout@v4
      - name: Simulate deployment
        run: |
          cp .env.uat .env
          echo "Deploying to UAT with .env.uat"

  deploy-production:
    name: Deploy simulation PRODUCTION
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref_name == 'main' || github.ref_name == 'master'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Simulate deployment
        run: |
          cp .env.prod .env
          echo "Deploying to PROD with .env.prod"

  notify:
    name: Notify maintainers
    runs-on: ubuntu-latest
    needs: [tests, static-analysis, lint]
    if: always()
    steps:
      - name: Print pipeline result notification
        run: |
          echo "Pipeline result for maintainers: ${{ job.status }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
